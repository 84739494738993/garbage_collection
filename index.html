<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь</title>
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        table {
            width: 90%;
            height: 90%;
            border-collapse: collapse;
            text-align: center;
            
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            font-size: 60px;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        }
        th {
            background-color: #f4f4f4;
            
        }
        .calendar-container {
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        @media(max-width:900px){
            th, td {
            border: 1px solid black;
            padding: 5px;
            font-size: 20px;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
    }
}
    </style>
</head>
<body>
    <div class="calendar-container">
        <table id="myTable">

        </table>
    </div>

    <script>


    const list_day_zmieszane   = [3,17,25,15,29,12,26,10,24,7,21,4,18,2,16,30,13,27,11,29,8,22]
    const list_day_segregacja   = [22,20,17,15,12,9,7,4,2,30,27]
    const list_day_bioodpady   = [2,16,30,14,28,11,25,9,23,6,20,3,17,1,15,29,12,26,10,19,7,21]
    const list_day_gabaryty   = [20,18]
    const list_month_zmieszane   = [4,4,4,5,5,6,6,7,7,8,8,9,9,10,10,10,11,11,12,12,1,1]
    const list_month_segregacja   = [4,5,6,7,8,9,10,11,12,12,1]
    const list_month_bioodpady   = [4,4,4,5,5,6,6,7,7,8,8,9,9,10,10,10,11,11,12,12,1,1]
    const list_month_gabaryty   = [4,8]
        let the_end = []
        let prowerka = 0

        const table = document.getElementById("myTable");
let day = 1;
let month_day = [31,28,31,30,31,30,31,31,30,31,30,31];
const today = new Date();
const month = today.getMonth();
const year = today.getFullYear();

function day_today() {
    const today = new Date();
    const day = today.getDate();
    const cells = document.querySelectorAll("#myTable td");
    cells.forEach(cell => {
        if (parseInt(cell.textContent) === day) {
            cell.style.border = "5px solid red";
        }
    });
}


// Проверка на високосный год (для февраля)
if ((year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0)) {
    month_day[1] = 29; // Февраль в високосном году
}

for (let i = 0; i < 5; i++) {
    const row = table.insertRow();

    for (let j = 0; j < 7; j++) {
        if (day > month_day[month]) break; // Если день выходит за пределы месяца, выходим из цикла

        const cell = row.insertCell();
        cell.textContent = day;

        // Проверка условий для покраски ячеек
        for (let i = 0; i < list_day_zmiszane.length; i++) {
            if (list_day_zmiszane[i] === day) {
                if (list_month_zmiszane[i] === month ) {
                    cell.style.backgroundColor = "rgb(0, 200, 0)";
                }
            }
        }

        for (let i = 0; i < list_day_segregacja.length; i++) {
            if (list_day_segregacja[i] === day) {
                if (list_month_segregacja[i] === month ) {
                    cell.style.backgroundColor = "yellow";
                }
            }
        }

        for (let i = 0; i < list_day_bioodpady.length; i++) {
            if (list_day_bioodpady[i] === day) {
                if (list_month_bioodpady[i] === month ) {
                    cell.style.backgroundColor = "#8B4513";
                }
            }
        }

        for (let i = 0; i < list_day_gabaryty.length; i++) {
            if (list_day_gabaryty[i] === day) {
                if (list_month_gabaryty[i] === month ) {
                    cell.style.backgroundColor = "orange";
                }
            }
        }

        // Применение линейного градиента для определённых дней
        if (day === 3 && month + 1 === 4) {
            cell.style.background = "linear-gradient(orange 50%, green 50%)";
        }

        if (day === 16 && month + 1 === 10) {
            cell.style.background = "linear-gradient(orange 50%, green 50%)";
        }

        day += 1; 
    }
}

day_today();
    </script>
</body>
</html>
